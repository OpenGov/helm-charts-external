{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "og-application.fullname" . }}
  labels:
    {{- include "og-application.labels" . | nindent 4 }}
  annotations:
    {{- include "og-application.annotations" . | nindent 4 }}
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default (.Values.service.portName | default "http") }}
      protocol: TCP
      name: {{ .Values.service.portName | default "http" }}
    {{- range .Values.service.additionalPorts }}
    - port: {{ .port }}
      targetPort: {{ .port }}
      protocol: {{ .protocol }}
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "og-application.selectorLabels" . | nindent 4 }}
{{- end }}
