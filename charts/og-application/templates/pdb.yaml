{{- if and .Values.podDisruptionBudget.enabled (or (and .Values.autoscaling.enabled (gt (int .Values.autoscaling.minReplicas) 1 )) (gt (int .Values.replicaCount) 1 )) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "og-application.fullname" . }}
  labels:
    {{- include "og-application.labels" . | nindent 4 }}
  {{- with .Values.podDisruptionBudget.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "og-application.selectorLabels" . | nindent 6 }}
{{- end }}
