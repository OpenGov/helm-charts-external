# Default values for og-application.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Workload type: deployment or statefulset
# Use 'statefulset' for stateful applications that need stable network identities and persistent storage
workloadType: deployment

# When rollouts is enabled, we replace the Deployment Object with a Rollout Object
rollouts:
  enabled: false
  # When strategy is blueGreen the rollout will be. Currently only supports blueGreen
  strategy: blueGreen
  # Create a success-rate template and add it to postPromotionAnalysis
  # This is an opinionated template that uses the Linkerd metrics
  # If rolloutsDeploymentStrategy is set, these defaults will be overridden
  successRateTemplate:
    enabled: false
    address: http://prometheus.monitoring.svc.cluster.local:9090
    interval: 30s
    successCondition: result[0] >= 0.95
    count: 10
    failureLimit: 2
    consecutiveSuccessLimit: 2

# Strategy to use for the rollout. This is only used when rollouts is enabled.
# Overrides the default strategy for the rollout.
rolloutsDeploymentStrategy: {}

# Namespace configuration
# Create namespace via helm template (labels/annotations added by kustomize commonAnnotations)
# Example:
#   namespace:
#     create: true
#     name: my-namespace
namespace:
  create: false
  name: "" # Defaults to .Release.Namespace if empty

replicaCount: 1

progressDeadlineSeconds: 300

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Labels added to every manifest (Deployment, Service, Ingress, ConfigMap, etc.)
# Chart always adds: helm.sh/chart, app.kubernetes.io/name, app.kubernetes.io/instance,
# app.kubernetes.io/managed-by, namespace (release namespace)
# Add extra labels here, e.g. team, environment, part-of
commonLabels: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 30%

serviceAccount:
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

deploymentAnnotations:
  reloader.stakater.com/auto: "true"

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

# Pod annotations. Empty by default; add in your app values file as needed.
podAnnotations: {}

dnsConfig: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

emptyDir: {}

# Multiple emptyDir volumes (optional)
# Example:
# emptyDirs:
#   - name: tmp
#     mountPath: /tmp
#     sizeLimit: 100Mi
#   - name: cache
#     mountPath: /cache
#     medium: Memory
#     sizeLimit: 100Mi
#   - name: logs
#     mountPath: /var/log
emptyDirs: []

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# Service configuration
# port: External service port (what clients connect to)
# targetPort: Container port (where app listens) - used for containerPort in deployment
# Example: service.port: 80, service.targetPort: 3001 → Service:80 → Container:3001
service:
  additionalPorts: []
  enabled: true
  type: ClusterIP
  port: 8000
  portName: http # Name for the main port (e.g., http, backend, api)
  targetPort: 8000 # Container port - should be numeric when different from port
  annotations: {}

sessionAffinity:
  enabled: false
  mode: persistent

# Ingress: set className to your ingress controller (e.g. nginx, alb).
# Annotations depend on the controller; see examples below.
ingress:
  enabled: true
  # Set to your ingress class: "nginx", "alb", or cluster-specific value
  className: ""
  # Controller-specific annotation examples (uncomment and adjust as needed):
  #
  # NGINX Ingress (className: nginx):
  #   annotations:
  #     nginx.ingress.kubernetes.io/ssl-redirect: "true"
  #     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  #     nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  #     cert-manager.io/cluster-issuer: "letsencrypt-prod"
  #     external-dns.alpha.kubernetes.io/hostname: "app.example.com"
  #
  # AWS ALB Ingress (className: alb):
  #   annotations:
  #     alb.ingress.kubernetes.io/scheme: internet-facing
  #     alb.ingress.kubernetes.io/target-type: ip
  #     alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
  #     alb.ingress.kubernetes.io/ssl-redirect: "443"
  #     alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:region:account:certificate/xxx"
  #     external-dns.alpha.kubernetes.io/hostname: "app.example.com"
  #     alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]' # GST asked us not to listen on port 80
  #     alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:214286935198:certificate/7dddecd3-6f02-4555-bc46-97d4df9e496a, arn:aws:acm:us-west-2:214286935198:certificate/584e568b-cd1b-401f-b0b2-ba58b1db0c54
  #     alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
  #   # redirect all HTTP to HTTPS
  #     alb.ingress.kubernetes.io/ssl-redirect: '443'
  #     alb.ingress.kubernetes.io/tags: environment=integration,department=rnd,suite=procurement,team=procurement,service=procurement
  #     alb.ingress.kubernetes.io/group.name: procurement-int-eks
  # #
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Gateway API HTTPRoute configuration
# HTTPRoute connects your application to an existing Gateway in the cluster
# (Gateway is managed by platform team and already deployed)
#
# Example configuration:
#   httproute:
#     enabled: true
#     namespace: my-app  # Same as your service namespace
#     parentRefs:
#       - name: cpa-gateway  # Existing Gateway in cluster
#         namespace: kgateway-system
#     hostnames:
#       - my-app.integration.engops.opengov.zone
#     rules:
#       - matches:
#           - path:
#               type: PathPrefix
#               value: /
#         timeouts:
#           request: 60s
#           backendRequest: 55s
httproute:
  enabled: false
  # HTTPRoute name (default: release name)
  name: ""
  # HTTPRoute namespace (default: Release.Namespace)
  namespace: ""
  # Additional labels for HTTPRoute resource
  labels: {}
  # Additional annotations for HTTPRoute resource
  annotations: {}
  # Parent Gateway references (required when enabled)
  # Example:
  # parentRefs:
  #   - name: staging-gateway
  #     namespace: management
  parentRefs: []
  # Hostnames for routing (optional, can be inherited from Gateway)
  hostnames: []
  # Routing rules (required when enabled)
  #
  # Basic path routing:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /api
  #     backendRefs:
  #       - name: my-service
  #         port: 8080
  #         namespace: platform
  #     timeouts:
  #       request: "900s"
  #
  # Method-based routing:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /api/users
  #         method: POST
  #     backendRefs:
  #       - name: user-service
  #         port: 8080
  #
  # Query parameter matching:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /api
  #         queryParams:
  #           - name: version
  #             value: v2
  #
  # Header-based routing:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /api
  #         headers:
  #           - name: X-API-Version
  #             value: v2
  #
  # Traffic splitting (canary/blue-green):
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /
  #     backendRefs:
  #       - name: stable-service
  #         port: 8080
  #         weight: 90
  #       - name: canary-service
  #         port: 8080
  #         weight: 10
  #
  # Request header modification:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /api
  #     filters:
  #       - type: RequestHeaderModifier
  #         requestHeaderModifier:
  #           add:
  #             - name: X-Custom-Header
  #               value: custom-value
  #           set:
  #             - name: X-Request-ID
  #               value: generated-id
  #           remove:
  #             - X-Internal-Header
  #
  # Response header modification:
  # rules:
  #   - filters:
  #       - type: ResponseHeaderModifier
  #         responseHeaderModifier:
  #           add:
  #             - name: X-Response-Time
  #               value: "100ms"
  #           remove:
  #             - Server
  #
  # URL rewrite (path prefix replacement):
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /v1
  #     filters:
  #       - type: URLRewrite
  #         urlRewrite:
  #           path:
  #             type: ReplacePrefixMatch
  #             replacePrefixMatch: /v2
  #
  # Request redirect:
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /old-path
  #     filters:
  #       - type: RequestRedirect
  #         requestRedirect:
  #           scheme: https
  #           statusCode: 301
  #           path:
  #             type: ReplacePrefixMatch
  #             replacePrefixMatch: /new-path
  #
  # Request mirroring (traffic shadowing):
  # rules:
  #   - backendRefs:
  #       - name: production-service
  #         port: 8080
  #     filters:
  #       - type: RequestMirror
  #         requestMirror:
  #           backendRef:
  #             name: test-service
  #             port: 8080
  rules: []

# Multiple HTTPRoutes (for separate internal/external routing)
# Example:
# httproutes:
#   - name: external-routes
#     enabled: true
#     namespace: platform
#     parentRefs:
#       - name: external-gateway
#         namespace: management
#     rules:
#       - matches:
#           - path:
#               type: PathPrefix
#               value: /api/public
#         backendRefs:
#           - name: my-service
#             port: 8080
#             namespace: platform
#   - name: internal-routes
#     enabled: true
#     namespace: platform
#     parentRefs:
#       - name: internal-gateway
#         namespace: management
#     rules:
#       - matches:
#           - path:
#               type: PathPrefix
#               value: /api/internal
#         backendRefs:
#           - name: my-service
#             port: 8080
#             namespace: platform
httproutes: []

# AgentgatewayPolicy: Custom policy for AgentGateway (body size, timeouts, retries, etc.)
# Only applies when using AgentGateway as your Gateway implementation
#
# Basic body size configuration:
#   agentgatewayPolicy:
#     enabled: true
#     namespace: management
#     targetRefs:
#       - name: my-app
#         namespace: platform
#     frontend:
#       http:
#         maxBufferSize: 3145728  # 3MB
#
# Advanced configuration with retries and timeouts:
#   agentgatewayPolicy:
#     enabled: true
#     targetRefs:
#       - name: my-app
#         namespace: platform
#     frontend:
#       http:
#         maxBufferSize: 10485760  # 10MB for large uploads
#         requestTimeout: 300s
#         idleTimeout: 60s
#     backend:
#       http:
#         connectionTimeout: 10s
#         maxConnections: 1000
#     retry:
#       attempts: 3
#       backoff: 1s
#       retryOn:
#         - "5xx"
#         - "reset"
#         - "connect-failure"
agentgatewayPolicy:
  enabled: false
  # Policy name (default: body-size-{fullname})
  name: ""
  # Policy namespace (default: management - where Gateway lives)
  namespace: management
  # Additional labels for AgentgatewayPolicy resource
  labels: {}
  # Additional annotations for AgentgatewayPolicy resource
  annotations: {}
  # Target HTTPRoute references (required when enabled)
  # Example:
  # targetRefs:
  #   - name: my-app
  #     namespace: platform
  #   - name: my-app-internal
  #     namespace: platform
  targetRefs: []
  # Frontend policy (client-facing settings)
  # Common options:
  #   http:
  #     maxBufferSize: 3145728        # Max request body size (bytes)
  #     requestTimeout: 300s          # Total request timeout
  #     idleTimeout: 60s              # Connection idle timeout
  #     maxRequestHeaderSize: 8192    # Max header size (bytes)
  frontend: {}
  # Backend policy (upstream connection settings)
  # Common options:
  #   http:
  #     connectionTimeout: 10s        # Backend connection timeout
  #     maxConnections: 1000          # Max connections to backend
  #     maxPendingRequests: 1024      # Max pending requests
  #     http2MaxRequests: 100         # Max HTTP/2 requests
  backend: {}
  # Retry policy
  # Example:
  #   retry:
  #     attempts: 3
  #     backoff: 1s
  #     retryOn:
  #       - "5xx"
  #       - "reset"
  #       - "connect-failure"
  #       - "retriable-4xx"
  retry: {}

configMap:
  enabled: true
  data: {}

command: []

appName: ""

env: []

# extraConfigMaps and extraSecrets to be mounted as envFrom
extraConfigMaps: []
extraSecrets: []

# Mount ConfigMaps as files in the Deployment
extraConfigMapVolumes: []
extraSecretVolumes: []

# ExternalSecret configuration
# Simplified format - secretStoreRef defaults to {fullname}-secret-store
#
# Example 1 - Minimal (auto-generates secretStoreRef):
#   externalSecret:
#     enabled: true
#     secrets:
#       DATABASE_URL: apps/my-app-secrets
#       DB_PASSWORD: apps/my-app-secrets
#
# Example 2 - Custom secretStoreRef:
#   externalSecret:
#     enabled: true
#     secretStoreRef:
#       kind: ClusterSecretStore
#       name: custom-secret-store
#     secrets:
#       DATABASE_URL: apps/my-app-secrets
#
# Example 3 - Different AWS property name (same env var, avoid duplicate keys in one secret):
#   When multiple apps use the same env var name but AWS secret has per-app keys (e.g. ABC_USER, DEF_USER),
#   use "secretId::property" so the K8s Secret key (env var) can differ from the AWS property name:
#   secrets:
#     SPRING_DATASOURCE_USERNAME: shared-services-production/apps/nexus-ipfx::ABC_SPRING_DATASOURCE_USERNAME
#   (K8s key = SPRING_DATASOURCE_USERNAME, AWS property = ABC_SPRING_DATASOURCE_USERNAME)
externalSecret:
  enabled: true
  # Simplified: K8S_SECRET_KEY: aws-secret-id  (AWS property = same as K8S_SECRET_KEY)
  # Or: K8S_SECRET_KEY: aws-secret-id::AWS_PROPERTY_NAME  (AWS property can differ)
  secrets: {}
  # Legacy verbose format (backward compatible)
  data: []
  refreshInterval: 1h
  # secretStoreRef defaults to {fullname}-secret-store with kind: SecretStore
  secretStoreRef:
    kind: "" # Defaults to SecretStore
    name: "" # Defaults to {fullname}-secret-store
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    template: {}

# Additional ExternalSecrets (list). Each item creates a separate ExternalSecret with its own name.
# externalSecrets:
#   - name: db-secrets
#     secretStoreRef:
#       kind: ClusterSecretStore
#       name: cluster-secret-store
#     refreshInterval: 1h    # optional, defaults to 1h
#     secrets:
#       DB_USERNAME: platform-int-eks/apps/my-app
#       DB_PASSWORD: platform-int-eks/apps/my-app
#   - name: api-secrets
#     secretStoreRef:
#       kind: ClusterSecretStore
#       name: cluster-secret-store
#     secrets:
#       API_KEY: platform-int-eks/apps/my-app-api
externalSecrets: []

startupProbe: {}

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 30"]

terminationGracePeriodSeconds: 60

resources: {}

autoscaling:
  enabled: false
  type: "scaledobject"
  minReplicas: 1
  maxReplicas: 10

nodeSelector: {}

# Simplified anti-affinity configuration
# Spreads pods across zones and/or hosts for high availability
# Supports per-topology types (zoneType, hostType) or global type
# Default: spreads across hosts with soft anti-affinity
#
# Example 1 - Same type for all (backward compatible):
#   antiAffinity:
#     spreadAcrossZones: true
#     spreadAcrossHosts: true
#     type: hard              # Both zones and hosts use hard anti-affinity
#
# Example 2 - Mixed types (new feature):
#   antiAffinity:
#     spreadAcrossZones: true
#     zoneType: soft          # Soft for zones (preferred, won't block scheduling)
#     spreadAcrossHosts: true
#     hostType: hard          # Hard for hosts (required, pod stays Pending if not satisfied)
antiAffinity:
  spreadAcrossZones: true # Spread pods across AWS availability zones
  spreadAcrossHosts: true # Spread pods across different nodes
  type: soft # Global type: soft = preferred, hard = required
  # zoneType: soft           # Override type for zone spreading (optional)
  # hostType: soft           # Override type for host spreading (optional)

# Custom affinity rules (advanced - overrides antiAffinity if set)
# Use this only if you need complex affinity rules not covered by antiAffinity
affinity: {}

# Custom topology spread constraints (optional - defaults to zone spreading)
# Example:
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: DoNotSchedule
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: myapp
topologySpreadConstraints: []

tolerations: []

initContainer:
  enabled: false
  args: []
  command: []
  resources: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# NetworkPolicy configuration
# Simplified format with auto-generated common rules
networkPolicy:
  enabled: true

  # Auto-generated rules (common for most apps)
  allowPrometheusIngress: true # Allow monitoring/alloy to scrape :9000
  allowDnsEgress: true # Allow DNS resolution (kube-system/kube-dns)
  allowExternalEgress: false # Allow egress to external IPs (non-private)
  externalEgressPorts: [443] # Ports for external egress (when enabled)

  # Simplified ingress rules
  # Example:
  #   allowIngressFrom:
  #     - app: frontend           # Allow from app.kubernetes.io/name: frontend
  #       port: 8080
  #     - namespace: other-ns     # Allow from namespace
  #       port: 8080
  #     - partOf: my-suite        # Allow from app.kubernetes.io/part-of label
  #       port: 8080
  allowIngressFrom: []

  # Simplified egress rules
  # Example:
  #   allowEgressTo:
  #     - app: database           # Allow to app.kubernetes.io/name: database
  #       port: 5432
  #     - namespace: redis-ns     # Allow to namespace
  #       port: 6379
  allowEgressTo: []

  # Legacy verbose format (backward compatible)
  ingress: []
  egress: []

# SecretStore configuration (for ExternalSecrets) - namespaced
secretStore:
  enabled: false
  # name: custom-secret-store-name  # Optional, defaults to {fullname}-secret-store
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: "" # Defaults to serviceAccount name if empty

# ClusterSecretStore configuration (optional, cluster-scoped)
# Use when you want this chart to create a ClusterSecretStore (e.g. shared by multiple namespaces).
# Set externalSecret.secretStoreRef.kind: ClusterSecretStore and .name to clusterSecretStore.name to use it.
# clusterSecretStore:
#   enabled: false
#   name: "" # e.g. cluster-secret-store; required when enabled
#   provider:
#     aws:
#       service: SecretsManager
#       region: us-west-2
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: ""   # SA name that has IRSA for Secrets Manager
#             namespace: "" # SA namespace (optional; often external-secrets)

# CronJob configuration
cronJob:
  enabled: false
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  suspend: false
  restartPolicy: OnFailure
  ttlSecondsAfterFinished: 86400
  command: []
  args: []
  env: []
  resources: {}
  podAnnotations: {}

# StatefulSet configuration (only used when workloadType: statefulset)
statefulSet:
  # Service name for the StatefulSet (required for stable network identity)
  serviceName: "" # Defaults to release name if empty
  # Pod management policy: OrderedReady or Parallel
  podManagementPolicy: OrderedReady
  # Update strategy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  # Persistent volume claim templates for StatefulSet
  # Example:
  # volumeClaimTemplates:
  #   - metadata:
  #       name: data
  #     spec:
  #       accessModes: ["ReadWriteOnce"]
  #       storageClassName: gp3
  #       resources:
  #         requests:
  #           storage: 10Gi
  volumeClaimTemplates: []
