# Default values for application-core.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# When rollouts is enabled, we replace the Deployment Object with a Rollout Object
rollouts:
  enabled: false
  # When strategy is blueGreen the rollout will be. Currently only supports blueGreen
  strategy: blueGreen
  # Create a success-rate template and add it to postPromotionAnalysis
  # This is an opinionated template that uses the Linkerd metrics
  # If rolloutsDeploymentStrategy is set, these defaults will be overridden
  successRateTemplate:
    enabled: false
    address: http://prometheus.monitoring.svc.cluster.local:9090
    interval: 30s
    successCondition: result[0] >= 0.95
    count: 10
    failureLimit: 2
    consecutiveSuccessLimit: 2

# Adds a Job that will run to update the Github Deployment Status
githubDeploymentHook:
  image: 918073871806.dkr.ecr.us-west-2.amazonaws.com/pro-github-deployment-hook:v0.1.1
  enabled: false
  githubRepo: 'opengov/repo'
  # ConfigMapName that stores the environment name, log url, and github ref
  # The keys in the configMap are used to set the environment variables
  configMapName: github-deployment-hook
  logUrlKey: log_url
  environmentNameKey: environment
  githubRefKey: ref
  envUrlKey: env_url
  # Secret that stores the Github Token
  secretName: github-deployment-hook
  githubTokenSecretKey: GITHUB_TOKEN

# Strategy to use for the rollout. This is only used when rollouts is enabled.
# Overrides the default strategy for the rollout.
rolloutsDeploymentStrategy: {}
  # blueGreen:
  #   activeService: pro-api1
  #   previewService: pro-api1-preview
  #   autoPromotionEnabled: true
  #   postPromotionAnalysis:
  #     templates:
  #       - templateName: success-rate
  #     args:
  #       - name: deployment
  #         value: "pro-api1"
  #       - name: latest-hash
  #         valueFrom:
  #           podTemplateHashValue: "Latest"
  #       - name: namespace
  #         value: "pro-monorepo-test-development"

replicaCount: 1

progressDeadlineSeconds: 300

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 30%

serviceAccount:
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

deploymentAnnotations:
  reloader.stakater.com/auto: "true"

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

podAnnotations:
  linkerd.io/inject: enabled
  # One second longer than lifecycle.preStop.exec.command
  config.alpha.linkerd.io/proxy-wait-before-exit-seconds: "31"

dnsConfig:
  {}
  # options:
  #   - name: single-request-reopen

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

emptyDir:
  {}
  # mountPath: /empty-dir
  # sizeLimit: 1024Mi

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  additionalPorts: []
    # - port: 9876
    #   targetPort: 9876
    #   protocol: TCP
    #   name: metrics
  enabled: true
  type: ClusterIP
  port: 8000
  annotations: {}

sessionAffinity:
  enabled: false
  # cookieName: "JSESSIONID"
  mode: persistent # persistent|balanced

ingress:
  enabled: false
  className: "nginx"
  annotations:
    external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Preview Ingress for Argo Rollouts blue-green deployments.
# Routes to the preview Service so tests can validate new versions before traffic switch.
# Requires rollouts.enabled and ingress.enabled to also be true.
ingressPreview:
  enabled: false
  className: "nginx"
  annotations:
    external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: preview-chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: preview-chart-example-tls
  #    hosts:
  #      - preview-chart-example.local

# HTTPRoute for Gateway API (AgentGateway migration from NGINX Ingress).
# Deploys an HTTPRoute resource that attaches to the procurement Gateway.
# Used alongside or as a replacement for the Ingress resource above.
#
# When httpRoute.enabled is true, an HTTPRoute is always created.
# An AgentgatewayPolicy is ONLY created when any CORS config (allowOrigins, allowHeaders, etc.) or requestTimeout is provided.
#
# Example 1: Simple service (only HTTPRoute, no policy)
#   httpRoute:
#     enabled: true
#     hostnames:
#       - procurement.ogintegration.us
#
# Example 2: Service with CORS (HTTPRoute + AgentgatewayPolicy)
#   httpRoute:
#     enabled: true
#     hostnames:
#       - api.procurement.ogintegration.us
#     cors:
#       allowCredentials: true
#       allowOrigins:
#         - https://procurement.ogintegration.us
#       allowHeaders:
#         - Content-Type
#         - Authorization
#         - traceparent
#
# Example 3: Path-based routing (shared hostname, custom rules)
#   httpRoute:
#     enabled: true
#     hostnames:
#       - api.procurement.ogintegration.us
#     rules:
#       - matches:
#           - path:
#               type: PathPrefix
#               value: /api/v1/search
#         backendRefs:
#           - name: pro-search-service
#             port: 4001
#
# Example 4: Long timeout (websocket/streaming, HTTPRoute + AgentgatewayPolicy)
#   httpRoute:
#     enabled: true
#     hostnames:
#       - sync.procurement.ogintegration.us
#     requestTimeout: "3600s"
#
# Example 5: Full AgentgatewayPolicy (CORS + timeout combined)
#   httpRoute:
#     enabled: true
#     hostnames:
#       - contract-doc-sync.procurement.ogintegration.us
#     requestTimeout: "3600s"
#     cors:
#       allowCredentials: true
#       allowOrigins:
#         - https://procurement.ogintegration.us
#         - https://assets.procurement.opengov.com
#       allowHeaders:
#         - DNT
#         - Keep-Alive
#         - User-Agent
#         - X-Requested-With
#         - If-Modified-Since
#         - Cache-Control
#         - Content-Type
#         - Range
#         - Authorization
#         - traceparent
#       allowMethods:
#         - GET
#         - POST
#         - PUT
#         - DELETE
#         - OPTIONS
#       maxAge: 86400
#
# This generates an AgentgatewayPolicy resource:
#   apiVersion: agentgateway.dev/v1alpha1
#   kind: AgentgatewayPolicy
#   spec:
#     targetRefs:
#       - group: gateway.networking.k8s.io
#         kind: HTTPRoute
#         name: <service-name>
#     traffic:
#       cors:
#         allowCredentials: true
#         allowOrigins: [...]
#         allowHeaders: [...]
#         allowMethods: [...]
#         maxAge: 86400
#       timeouts:
#         request: "3600s"
#
httpRoute:
  enabled: false
  parentRefs:
    - name: procurement-gateway
      namespace: agentgateway-system
  hostnames: []
  annotations: {}
  # Override rules for custom path routing; if omitted, defaults to
  # PathPrefix "/" -> service fullname:service.port
  rules: []
  timeouts: {}
  # Request timeout for AgentgatewayPolicy (e.g., "60s", "3600s")
  requestTimeout: ""
  cors:
    allowCredentials: false
    allowOrigins: []
    allowHeaders: []
    allowMethods: []
    maxAge: null

configMap:
  enabled: false
  data: {}

command: []

appName: ""

env: []
  # - name: FOO
  #   value: BAR
  # - name: BAZ
